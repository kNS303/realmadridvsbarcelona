name: 📊 Actualizar estadísticas

# Cuándo se ejecuta:
on:
  schedule:
    # Cada lunes a las 06:00 UTC (08:00 hora España)
    - cron: '0 6 * * 2'
  # También se puede ejecutar manualmente desde GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔄 Ejecutar script de actualización
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node scripts/update-stats.js

      - name: 📝 Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json js/data.js scripts/update-log.txt
          if git diff --staged --quiet; then
            echo "✨ Sin cambios, todo está al día"
          else
            git commit -m "📊 Actualización automática de estadísticas $(date +'%Y-%m-%d')"
            git push
            echo "✅ Datos actualizados y publicados"
          fi
